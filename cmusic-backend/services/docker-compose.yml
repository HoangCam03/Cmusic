
services:
  mongodb:
    image: mongo:latest
    container_name: cmusic-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - "27017:27017"
    volumes: 
      - mongodb_data:/data/db
    networks:
      - cmusic-network

  api-gateway:
    build:
      context: ../
      dockerfile: services/api-gateway/Dockerfile
    container_name: cmusic-api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - GATEWAY_PORT=3000
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/cmusic?authSource=admin
      - JWT_ACCESS_SECRET=spotify_jwt_secret_2026
      - JWT_REFRESH_SECRET=spotify_refresh_secret_2026
      - NOTIFICATION_SERVICE_URL=http://notification-service:3010
    depends_on:
      - mongodb
    networks:
      - cmusic-network

  auth-service:
    build:
      context: ../
      dockerfile: services/auth-service/Dockerfile
    container_name: cmusic-auth-service
    ports:
      - "3001:3001"
    env_file:
      - ./auth-service/.env
    environment:
      - NODE_ENV=development
      - AUTH_SERVICE_PORT=3001
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/cmusic?authSource=admin
      - JWT_ACCESS_SECRET=spotify_jwt_secret_2026
      - JWT_ACCESS_EXPIRE=15m
      - JWT_REFRESH_SECRET=spotify_refresh_secret_2026
      - JWT_REFRESH_EXPIRE=30d
    depends_on:
      - mongodb
    networks:
      - cmusic-network

  user-service:
    build:
      context: ../
      dockerfile: services/user-service/Dockerfile
    container_name: cmusic-user-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - USER_SERVICE_PORT=3002
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/cmusic?authSource=admin
      - JWT_ACCESS_SECRET=spotify_jwt_secret_2026
      - JWT_REFRESH_SECRET=spotify_refresh_secret_2026
    depends_on:
      - mongodb
    networks:
      - cmusic-network

  catalog-service:
    build:
      context: ../
      dockerfile: services/catalog-service/Dockerfile
    container_name: cmusic-catalog-service
    ports:
      - "3003:3003"
    env_file:
      - ./catalog-service/.env
    environment:
      - NODE_ENV=development
      - JWT_ACCESS_SECRET=spotify_jwt_secret_2026
      - JWT_REFRESH_SECRET=spotify_refresh_secret_2026
      - NOTIFICATION_SERVICE_URL=http://notification-service:3010
    depends_on:
      - mongodb
    networks:
      - cmusic-network

  playlist-service:
    build:
      context: ../
      dockerfile: services/playlist-service/Dockerfile
    container_name: cmusic-playlist-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development 
      - PLAYLIST_SERVICE_PORT=3004
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/cmusic?authSource=admin
      - JWT_ACCESS_SECRET=spotify_jwt_secret_2026
      - JWT_REFRESH_SECRET=spotify_refresh_secret_2026
      - CLOUDINARY_CLOUD_NAME=dl3kqa0oy
      - CLOUDINARY_API_KEY=365641639148188
      - CLOUDINARY_API_SECRET=xd5Lvk-Gjy7DNjo61tgIieSr2kA
    depends_on:
      - mongodb
    networks:
      - cmusic-network

  likes-service:
    build:
      context: ../
      dockerfile: services/likes-service/Dockerfile
    container_name: cmusic-likes-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - LIKES_SERVICE_PORT=3005
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/cmusic?authSource=admin
      - JWT_ACCESS_SECRET=spotify_jwt_secret_2026
      - JWT_REFRESH_SECRET=spotify_refresh_secret_2026
    depends_on:
      - mongodb
    networks:
      - cmusic-network

  history-service:
    build:
      context: ../
      dockerfile: services/history-service/Dockerfile
    container_name: cmusic-history-service
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - HISTORY_SERVICE_PORT=3006
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/cmusic?authSource=admin
      - JWT_ACCESS_SECRET=spotify_jwt_secret_2026
      - JWT_REFRESH_SECRET=spotify_refresh_secret_2026
    depends_on:
      - mongodb
    networks:
      - cmusic-network

  search-service:
    build:
      context: ../
      dockerfile: services/search-service/Dockerfile
    container_name: cmusic-search-service
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=development
      - SEARCH_SERVICE_PORT=3007
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/cmusic?authSource=admin
      - JWT_ACCESS_SECRET=spotify_jwt_secret_2026
      - JWT_REFRESH_SECRET=spotify_refresh_secret_2026
    depends_on:
      - mongodb
    networks:
      - cmusic-network

  admin-service:
    build:
      context: ../
      dockerfile: services/admin-service/Dockerfile
    container_name: cmusic-admin-service
    ports:
      - "3008:3008"
    environment:
      - NODE_ENV=development
      - ADMIN_SERVICE_PORT=3008
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/cmusic?authSource=admin
      - JWT_ACCESS_SECRET=spotify_jwt_secret_2026
      - JWT_REFRESH_SECRET=spotify_refresh_secret_2026
    depends_on:
      - mongodb
    networks:
