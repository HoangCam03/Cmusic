  permission-service:
    build:
      context: ../
      dockerfile: services/permission-service/Dockerfile
    container_name: cmusic-permission-service
    ports:
      - "3009:3009"
    environment:
      - NODE_ENV=development
      - PERMISSION_SERVICE_PORT=3009
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/cmusic?authSource=admin
      - JWT_ACCESS_SECRET=spotify_jwt_secret_2026
      - JWT_REFRESH_SECRET=spotify_refresh_secret_2026
    depends_on:
      - mongodb
    networks:
      - cmusic-network

  notification-service:
    build:
      context: ../
      dockerfile: services/notification-service/Dockerfile
    container_name: cmusic-notification-service
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=development
      - PORT=3010
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/cmusic?authSource=admin
    depends_on:
      - mongodb
    networks:
      - cmusic-network

volumes:
  mongodb_data:


networks:
  cmusic-network:
    name: cmusic-network
    driver: bridge
